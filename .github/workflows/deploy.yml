name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Reuse existing CI pipeline
  ci:
    uses: ./.github/workflows/ci.yml

  # Build and push Docker images to GHCR
  build-and-push:
    name: Build ${{ matrix.image }}
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: frontend
            image: blog-frontend
          - context: backend
            image: blog-backend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "lowercase=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lowercase }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lowercase }}/${{ matrix.image }}:latest
          build-args: |
            VITE_API_URL=https://${{ vars.DOMAIN }}
            VITE_UMAMI_URL=https://${{ vars.DOMAIN }}/umami
            VITE_UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}

  # Build Umami with BASE_PATH and push to GHCR
  build-umami:
    name: Build umami
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "lowercase=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: "https://github.com/umami-software/umami.git#v3.0.3"
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lowercase }}/blog-umami:v3.0.3
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lowercase }}/blog-umami:latest
          build-args: |
            BASE_PATH=/umami

  # Deploy to EC2 via Tailscale
  deploy:
    name: Deploy to Production
    needs: [build-and-push, build-umami]
    runs-on: ubuntu-latest
    environment: CD
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Sync config files
        env:
          EC2_HOST: ${{ secrets.EC2_TAILSCALE_IP }}
        run: |
          tailscale ssh ec2-user@${EC2_HOST} "cat > /opt/blog/docker-compose.prod.yml" < docker-compose.prod.yml
          tailscale ssh ec2-user@${EC2_HOST} "mkdir -p /opt/blog/nginx && cat > /opt/blog/nginx/nginx.conf" < nginx/nginx.conf

      - name: Deploy via Tailscale SSH
        env:
          EC2_HOST: ${{ secrets.EC2_TAILSCALE_IP }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cat > /tmp/deploy.sh << 'EOF'
          set -euo pipefail
          cd /opt/blog

          # Pull latest images
          docker compose -f docker-compose.prod.yml pull frontend backend umami

          # Rolling restart
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # Run database migrations
          docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head

          # Health check with retry
          echo "Waiting for backend health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Health check failed after 60 seconds"
              docker compose -f docker-compose.prod.yml logs backend --tail=50
              exit 1
            fi
            sleep 2
          done

          # Clean up old images
          docker image prune -f

          echo "Deployment complete!"
          EOF

          tailscale ssh ec2-user@${EC2_HOST} "export IMAGE_TAG=${IMAGE_TAG} && bash -s" < /tmp/deploy.sh
