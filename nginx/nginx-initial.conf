# HTTP-only config for initial Let's Encrypt certificate provisioning.
# Usage:
#   1. Copy this as nginx.conf on first boot
#   2. Run: certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
#   3. Replace with the full nginx.conf and reload nginx

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 503;
        }
    }
}
